services:
  cmx-api:
    build:
      context: ./cmx
      dockerfile: Dockerfile
    container_name: cmx-worker-management
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      CMX_STORAGE_EXCEL_BASE_PATH: /app/data
      CMX_TRANSLATION_PROVIDER: ${CMX_TRANSLATION_PROVIDER:-property-file}
      CMX_TRANSLATION_CLOUD_PROVIDER: ${CMX_TRANSLATION_CLOUD_PROVIDER:-google}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY:-}
      AZURE_TRANSLATOR_API_KEY: ${AZURE_TRANSLATOR_API_KEY:-}
      AZURE_TRANSLATOR_REGION: ${AZURE_TRANSLATOR_REGION:-}
    volumes:
      - cmx-data:/app/data
    restart: unless-stopped

volumes:
  cmx-data:
