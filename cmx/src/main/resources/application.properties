spring.application.name=cmx-worker-management
server.port=8080

cmx.storage.type=excel
cmx.storage.excel.base-path=./data
cmx.storage.excel.basic-info-file=workers_basic_info.xlsx
cmx.storage.excel.skills-file=workers_skills.xlsx
cmx.storage.excel.ratings-file=workers_ratings.xlsx

cmx.translation.provider=property-file
cmx.translation.google.api-key=${GOOGLE_TRANSLATE_API_KEY:}
cmx.translation.google.timeout=5s
cmx.translation.cache.enabled=true
cmx.translation.cache.max-size=10000
cmx.translation.cache.ttl=24h
cmx.translation.on-failure.read=passthrough
cmx.translation.on-failure.write=fail

spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

logging.level.com.cmx.workermanagemnt=INFO
